name: Build with Gradle

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      jars: ${{ steps.collect.outputs.jars }}   # JSON array of filenames (basenames)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon shadowJar

      - name: Collect runtime JARs (flatten)
        run: |
          mkdir -p jars
          # collect jars from all subprojects; exclude sources/javadoc/tests/plain
          find . -path "*/build/libs/*.jar" -type f \
            ! -name "*-sources.jar" \
            ! -name "*-javadoc.jar" \
            ! -name "*-tests.jar" \
            ! -name "*-plain.jar" \
            -exec cp {} jars/ \;

      - name: Make list of JAR filenames (JSON)
        id: collect
        shell: bash
        run: |
          files=()
          while IFS= read -r -d '' f; do
            files+=("$(basename "$f")")
          done < <(find jars -type f -name "*.jar" -print0)

          if [ ${#files[@]} -eq 0 ]; then
            json='[]'
          else
            printf -v json '[%s]' "$(printf '"%s",' "${files[@]}" | sed 's/,$//')"
          fi

          echo "jars=$json" >> "$GITHUB_OUTPUT"

      - name: Upload temporary combined artifact
        if: steps.collect.outputs.jars != '[]'
        uses: actions/upload-artifact@v4
        with:
          name: all-jars
          path: jars/*.jar
          if-no-files-found: error
          retention-days: 14

  upload-each:
    needs: build
    if: needs.build.outputs.jars != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        jar: ${{ fromJSON(needs.build.outputs.jars) }}
    steps:
      - name: Download combined artifact
        uses: actions/download-artifact@v4
        with:
          name: all-jars
          path: jars

      - name: Upload this JAR as its own artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.jar }}
          path: jars/${{ matrix.jar }}
          if-no-files-found: error
          retention-days: 14
